name: iOS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  SCHEME: StockNote

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project StockNote.xcodeproj \
            -scheme $SCHEME

      - name: Build
        run: |
          xcodebuild build \
            -project StockNote.xcodeproj \
            -scheme $SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES

      - name: Test
        run: |
          xcodebuild test \
            -project StockNote.xcodeproj \
            -scheme $SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES
